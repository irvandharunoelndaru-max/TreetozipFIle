<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree → ZIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            background: #1e1e1e;
            color: #f0f0f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #2a2a2a;
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 900px;
        }
        h1 { color: #f5b800; margin-bottom: 5px; }
        .subtitle { color: #bbb; margin-bottom: 20px; }
        textarea {
            width: 100%;
            height: 350px;
            background: #141414;
            color: #ffe0b0;
            border: 1px solid #4a4a4a;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }
        textarea:focus { border-color: #f5b800; }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            background: #141414;
            border: 1px solid #4a4a4a;
            color: #f0f0f0;
            padding: 8px 12px;
            border-radius: 6px;
            width: 130px;
        }
        button {
            background: #f5b800;
            color: #1e1e1e;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #e5a800; }
        .btn-clear { background: #444; color: #ddd; }
        .btn-clear:hover { background: #555; }
        .status { color: #ffd54f; font-size: 14px; margin-left: 10px; }
        .status.error { color: #ff6b6b; }
        .tips { background: #232323; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 13px; color: #bbb; }
        .tips code { background: #363636; padding: 2px 6px; border-radius: 4px; color: #ffb300; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Tree → ZIP</h1>
        <p class="subtitle">Paste tree → Download ZIP. Aman, ringan, no bug.</p>
        <textarea id="treeInput">TMDCLauncher/
├── build.gradle.kts
├── settings.gradle.kts
├── gradle.properties
├── gradle/
│   └── wrapper/
│       ├── gradle-wrapper.jar
│       └── gradle-wrapper.properties
├── gradlew
├── gradlew.bat
└── app/
    ├── build.gradle.kts
    └── src/
        └── main/
            ├── AndroidManifest.xml
            ├── java/com/tmdc/tmdclauncher/
            │   ├── MainActivity.kt
            │   ├── ScreenStayService.kt
            │   └── SettingsActivity.kt
            └── res/
                ├── values/
                │   ├── strings.xml
                │   └── themes.xml
                ├── xml/
                │   └── settings_preferences.xml
                └── drawable/</textarea>
        <div class="controls">
            <input type="text" id="zipName" value="TMDCLauncher" placeholder="nama-file">
            <span style="color:#bbb">.zip</span>
            <button id="downloadBtn">⬇️ Download ZIP</button>
            <button class="btn-clear" id="clearBtn">🗑️ Clear</button>
            <span class="status" id="statusMsg"></span>
        </div>
        <div class="tips">
            <strong>💡 Cara pakai:</strong><br>
            • Baris dengan <code>/</code> = folder<br>
            • Baris lain = file kosong<br>
            • Indentasi = level folder<br>
            • Teks <code>(dalam kurung)</code> diabaikan
        </div>
    </div>

    <script>
        (function() {
            var ta = document.getElementById('treeInput');
            var btn = document.getElementById('downloadBtn');
            var clear = document.getElementById('clearBtn');
            var nameInput = document.getElementById('zipName');
            var status = document.getElementById('statusMsg');

            function parseTree(text) {
                var lines = text.split('\n');
                var entries = [];
                var stack = [{ depth: -1, path: '' }];

                for (var i = 0; i < lines.length; i++) {
                    var raw = lines[i];
                    if (raw.trim() === '') continue;

                    var cleaned = raw.replace(/^[│├└─\s]+/, '');
                    cleaned = cleaned.replace(/\s*\(.*?\)\s*$/, '');
                    cleaned = cleaned.trimEnd();
                    if (!cleaned) continue;

                    var prefixLen = raw.length - cleaned.length;
                    var depth = Math.floor(prefixLen / 4);
                    var isDir = cleaned.endsWith('/');
                    var name = isDir ? cleaned.slice(0, -1) : cleaned;

                    while (stack.length > 0 && stack[stack.length - 1].depth >= depth) {
                        stack.pop();
                    }
                    if (stack.length === 0) {
                        stack.push({ depth: -1, path: '' });
                    }

                    var parentPath = stack[stack.length - 1].path;
                    var fullPath = parentPath ? parentPath + '/' + name : name;

                    entries.push({ path: fullPath, isDir: isDir });

                    if (isDir) {
                        stack.push({ depth: depth, path: fullPath });
                    }
                }
                return entries;
            }

            btn.addEventListener('click', function() {
                status.textContent = '';
                var text = ta.value.trim();

                if (!text) {
                    status.textContent = '⚠️ Masukkan tree dulu.';
                    status.className = 'status error';
                    return;
                }

                var entries;
                try {
                    entries = parseTree(text);
                } catch (e) {
                    status.textContent = '❌ Error parsing.';
                    status.className = 'status error';
                    return;
                }

                if (entries.length === 0) {
                    status.textContent = '⚠️ Tidak ada entri valid.';
                    status.className = 'status error';
                    return;
                }

                var zip = new JSZip();

                for (var i = 0; i < entries.length; i++) {
                    var e = entries[i];
                    if (e.isDir) {
                        zip.folder(e.path);
                    } else {
                        zip.file(e.path, '');
                    }
                }

                zip.generateAsync({ type: 'blob' }).then(function(blob) {
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = (nameInput.value.trim() || 'archive') + '.zip';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(function() {
                        URL.revokeObjectURL(url);
                    }, 200);

                    status.textContent = '✅ Berhasil: ' + a.download + ' (' + entries.length + ' entri)';
                    status.className = 'status';
                }).catch(function(err) {
                    status.textContent = '❌ Gagal bikin ZIP.';
                    status.className = 'status error';
                });
            });

            clear.addEventListener('click', function() {
                ta.value = '';
                nameInput.value = 'TMDCLauncher';
                status.textContent = '';
            });
        })();
    </script>
</body>
</html>
